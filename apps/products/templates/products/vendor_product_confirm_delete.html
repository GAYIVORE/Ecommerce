{% extends 'base.html' %}
{% block title %}Remove {{ object.name }} — E Shop{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="card p-6 sm:p-8 text-center">
        <div class="mx-auto w-14 h-14 rounded-2xl bg-papaya-50 flex items-center justify-center text-papaya-600 border border-papaya-100 mb-4">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        </div>
        <h1 class="text-lg font-display font-bold text-ink-900 tracking-tight">Remove &ldquo;{{ object.name }}&rdquo;?</h1>
        <p class="text-xs text-ink-900/50 mt-2 leading-relaxed">
            This removes the listing from your storefront immediately. Sales history and analytics for this product are preserved.
        </p>

        <form method="post" class="mt-6 flex flex-col sm:flex-row gap-2 justify-center m-0">
            {% csrf_token %}
            <button type="submit" class="btn-danger !bg-papaya-600 !text-white !border-0 hover:!bg-papaya-700 w-full sm:w-auto">
                Confirm removal
            </button>
            <a href="{% url 'products:vendor_dashboard' %}" class="btn-ghost w-full sm:w-auto !normal-case !font-semibold !tracking-normal">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
