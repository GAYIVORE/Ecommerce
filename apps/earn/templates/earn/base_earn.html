{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10">
<div class="bg-ink-900 rounded-2xl sm:rounded-3xl p-5 sm:p-8 text-white/90">

    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-8">
        <div class="flex items-center gap-x-3">
            <div class="w-11 h-11 bg-jade-500 rounded-2xl flex items-center justify-center shrink-0">
                <i class="fa-solid fa-coins text-ink-900 text-xl"></i>
            </div>
            <div>
                <div class="font-display font-bold text-2xl tracking-tight text-white">Earn</div>
                <div class="text-jade-400 text-[10px] font-bold tracking-widest uppercase">Powered by E Shop</div>
            </div>
        </div>

        <div class="flex items-center gap-x-1 bg-ink-800 border border-white/10 p-1 rounded-3xl flex-wrap">
            <a href="{% url 'earn:dashboard' %}" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-3xl transition-colors {% if active_tab == 'dashboard' %}bg-jade-500 text-ink-900{% else %}text-white/60 hover:text-white{% endif %}">Overview</a>
            <a href="{% url 'earn:marketplace' %}" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-3xl transition-colors {% if active_tab == 'marketplace' %}bg-jade-500 text-ink-900{% else %}text-white/60 hover:text-white{% endif %}">Marketplace</a>
            <a href="{% url 'earn:quickcash' %}" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-3xl transition-colors {% if active_tab == 'quickcash' %}bg-jade-500 text-ink-900{% else %}text-white/60 hover:text-white{% endif %}">Quick cash</a>
            <a href="{% url 'earn:earnings' %}" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-3xl transition-colors {% if active_tab == 'earnings' %}bg-jade-500 text-ink-900{% else %}text-white/60 hover:text-white{% endif %}">Earnings</a>
            <a href="{% url 'earn:my_bookings' %}" class="px-4 py-2 text-xs sm:text-sm font-semibold rounded-3xl transition-colors {% if active_tab == 'bookings' %}bg-jade-500 text-ink-900{% else %}text-white/60 hover:text-white{% endif %}">Bookings</a>
        </div>

        <div class="bg-ink-800 border border-white/10 px-4 py-2.5 rounded-3xl text-sm flex items-center gap-x-2 self-start lg:self-auto">
            <i class="fa-solid fa-wallet text-jade-400"></i>
            <span class="font-bold text-white font-mono">GHS {{ nav_balance|floatformat:2 }}</span>
        </div>
    </div>

    {% block earn_content %}{% endblock %}
</div>
</div>
{% endblock %}
