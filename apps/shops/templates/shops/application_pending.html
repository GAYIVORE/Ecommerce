{% extends 'base.html' %}

{% block title %}Application pending — E Shop{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto my-10 sm:my-16 px-4">
    <div class="card p-8 sm:p-10 text-center">
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-2xl bg-marigold-50 text-marigold-600 mb-6">
            <svg class="h-8 w-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z" /></svg>
        </div>
        <h1 class="text-2xl sm:text-3xl font-display font-bold tracking-tight mb-3">Application pending</h1>
        <p class="text-sm font-medium text-ink-900/50 mb-8 max-w-md mx-auto leading-relaxed">
            Thanks for applying to become a vendor! Your application is under review — we'll notify you as soon as your shop is approved.
        </p>
        <a href="{% url 'core:home' %}" class="btn-primary inline-flex">Return home</a>
    </div>
</div>
{% endblock %}
