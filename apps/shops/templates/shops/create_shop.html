{% extends 'base.html' %}

{% block title %}Open your shop — E Shop{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto my-8 sm:my-12 px-4">
    <div class="card p-6 sm:p-8">
        <span class="text-xs font-black tracking-widest uppercase text-brand-500">Vendor application</span>
        <h2 class="text-xl sm:text-2xl font-display font-bold tracking-tight mt-1 mb-2">Open your shop</h2>
        <p class="text-sm font-medium text-ink-900/50 mb-6">Fill out the details below to apply for your own storefront on E Shop.</p>

        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="name" class="field-label">Shop name *</label>
                <input type="text" id="name" name="name" required class="field">
            </div>

            <div>
                <label for="phone_number" class="field-label">Contact phone number</label>
                <input type="text" id="phone_number" name="phone_number" placeholder="e.g., 024 000 0000" class="field">
            </div>

            <div>
                <label for="description" class="field-label">Description</label>
                <textarea id="description" name="description" rows="4" class="field" placeholder="Tell us about what your shop sells…"></textarea>
            </div>

            <div>
                <label for="image" class="field-label">Shop logo / banner</label>
                <input type="file" id="image" name="image" accept="image/*"
                       class="w-full text-sm text-ink-900/60 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:uppercase file:tracking-wider file:bg-brand-50 file:text-brand-600 hover:file:bg-brand-100 transition-colors cursor-pointer">
            </div>

            <div class="flex items-center justify-end gap-4 border-t border-line pt-5">
                <a href="{% url 'shops:shop_directory' %}" class="text-sm font-bold text-ink-900/50 hover:text-ink-900 transition-colors">Cancel</a>
                <button type="submit" class="btn-primary">Submit application</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
