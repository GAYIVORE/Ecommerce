{% extends 'base.html' %}

{% block title %}Apply for a Shop - E-commerce Shop{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto my-10 p-8 bg-white rounded-xl shadow-md border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Apply for a Vendor Shop</h2>
    <p class="text-sm text-gray-600 mb-6">Fill out the details below to open your custom vendor marketplace platform.</p>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Shop Name *</label>
            <input type="text" id="name" name="name" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
        </div>

        <div>
            <label for="phone_number" class="block text-sm font-medium text-gray-700 mb-1">Contact Phone Number</label>
            <input type="text" id="phone_number" name="phone_number"
                   placeholder="e.g., +233 24 000 0000"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea id="description" name="description" rows="4"
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                      placeholder="Tell us about what your shop sells..."></textarea>
        </div>

        <div>
            <label for="image" class="block text-sm font-medium text-gray-700 mb-1">Shop Logo / Banner</label>
            <input type="file" id="image" name="image" accept="image/*"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 file:mr-4 file:py-1.5 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition outline-none">
        </div>

        <div class="flex items-center justify-end gap-4 border-t border-gray-100 pt-4">
            <a href="{% url 'shops:shop_directory' %}" class="px-4 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 transition">
                Cancel
            </a>
            <button type="submit" 
                    class="px-6 py-2 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 transition shadow-sm">
                Submit Application
            </button>
        </div>
    </form>
</div>
{% endblock %}
