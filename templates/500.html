<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something went wrong — E Shop</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
            background: #F7F7F4;
            color: #14151C;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #E7E5DE;
            border-radius: 20px;
            box-shadow: 0 8px 24px -12px rgba(20,21,28,0.12);
            max-width: 480px;
            width: 100%;
            padding: 48px 32px;
            text-align: center;
        }
        .code {
            font-weight: 700;
            font-size: 64px;
            letter-spacing: -0.03em;
            color: #E7E5DE;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }
        p {
            font-size: 14px;
            font-weight: 500;
            color: rgba(20,21,28,0.5);
            line-height: 1.6;
            margin-bottom: 28px;
        }
        a.btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #14151C;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 24px;
            border-radius: 12px;
        }
        a.btn:hover { background: #2A2C3D; }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">500</div>
        <h1>Something went wrong on our end</h1>
        <p>Our team has been notified. Please try again in a moment — your cart and account are safe.</p>
        <a class="btn" href="/">Back to home</a>
    </div>
</body>
</html>
