{% extends 'base.html' %}

{% block title %}Password changed — E Shop{% endblock %}

{% block content %}
<div class="w-full max-w-md mx-auto px-4 py-16 flex items-center justify-center">
    <div class="w-full card p-8 sm:p-10 text-center">
        <div class="mx-auto h-16 w-16 rounded-2xl flex items-center justify-center mb-6 text-jade-600 bg-jade-50 border border-jade-100">
            <svg class="h-8 w-8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
        </div>
        <h2 class="text-xl sm:text-2xl font-display font-bold tracking-tight mb-2">Password changed</h2>
        <p class="text-sm font-medium text-ink-900/50 mb-6">Your password has been updated. You can now log in with your new password.</p>
        <a href="{% url 'users:login' %}" class="btn-primary inline-flex">Go to login</a>
    </div>
</div>
{% endblock %}
