{% extends 'base.html' %}

{% block title %}Check your email — E Shop{% endblock %}

{% block content %}
<div class="w-full max-w-md mx-auto px-4 py-16 flex items-center justify-center">
    <div class="w-full card p-8 sm:p-10 text-center">
        <div class="mx-auto h-16 w-16 rounded-2xl flex items-center justify-center mb-6 text-brand-500 bg-brand-50 border border-brand-100">
            <svg class="h-8 w-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
        </div>
        <h2 class="text-xl sm:text-2xl font-display font-bold tracking-tight mb-2">Check your email</h2>
        <p class="text-sm font-medium text-ink-900/50 mb-1">We've sent a password reset link to your inbox.</p>
        <p class="text-sm font-medium text-ink-900/50 mb-6">If it doesn't arrive shortly, check your spam folder.</p>
        <a href="{% url 'users:login' %}" class="btn-primary inline-flex">Back to login</a>
    </div>
</div>
{% endblock %}
